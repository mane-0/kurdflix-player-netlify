<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KurdFlix Player</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        :root { --plyr-color-main: #e50914; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #player-container { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: #000; position: relative; }
        
        /* Glassmorphism Controls */
        .plyr--video .plyr__controls {
            background: rgba(20, 20, 20, 0.25) !important;
            backdrop-filter: blur(15px) !important;
            -webkit-backdrop-filter: blur(15px) !important;
            border-radius: 12px !important;
            margin: 10px !important;
        }

        /* Ad Overlay Layout */
        #ad-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2147483647; display: none;
        }
        #skip-btn {
            position: absolute; bottom: 50px; right: 20px;
            background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(255,255,255,0.3);
            color: #fff; padding: 12px 24px; cursor: pointer;
            font-size: 15px; border-radius: 50px; z-index: 2147483647;
            direction: rtl;
        }
    </style>
</head>
<body>

<div id="player-container">
    <div id="ad-overlay">
        <video id="ad-video" playsinline webkit-playsinline style="width:100%; height:100%; object-fit: contain;">
            <source src="لینکی_ڤیدیۆی_ڕیکلامی_ناوخۆیی.mp4" type="video/mp4">
        </video>
        <div id="skip-btn">چاوەڕێ بکە (10)</div>
    </div>

    <video id="player" playsinline webkit-playsinline controls poster="https://i.postimg.cc/N0TsNXr0/film-daspeek-thumbnale.png">
        <source src="" type="video/mp4" />
    </video>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('src');
        
        const mainVideo = document.getElementById('player');
        const adOverlay = document.getElementById('ad-overlay');
        const adVideo = document.getElementById('ad-video');
        const skipBtn = document.getElementById('skip-btn');

        if (!videoUrl) return;

        const player = new Plyr('#player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
            fullscreen: { iosNative: true }
        });

        mainVideo.querySelector('source').src = videoUrl;
        mainVideo.load();

        let adPlayed = false;

        // کاتێک بەکارهێنەر کلیک لە پلەی دەکات
        player.on('play', () => {
            if (!adPlayed) {
                player.pause();
                startAd();
            }
        });

        function startAd() {
            adPlayed = true;
            adOverlay.style.display = 'block';
            adVideo.play().catch(() => { closeAd(); });

            let timeLeft = 10;
            const timer = setInterval(() => {
                timeLeft--;
                skipBtn.innerText = `تێپەڕاندنی ڕیکلام (${timeLeft})`;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    skipBtn.innerText = 'تێپەڕاندن';
                    skipBtn.onclick = closeAd;
                }
            }, 1000);
        }

        function closeAd() {
            adVideo.pause();
            adOverlay.style.display = 'none';
            player.play();
        }

        // کاتێک ڕیکلامەکە خۆی تەواو دەبێت
        adVideo.onended = closeAd;
    });
</script>

</body>
</html>

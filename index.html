<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KurdFlix Player - Ads Ready</title>
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    
    <style>
        :root {
            --plyr-color-main: #e50914;
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        #player-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
        
        /* ستایلی Glassmorphism بۆ پلەیەرەکە */
        .plyr--video .plyr__controls {
            background: rgba(20, 20, 20, 0.25) !important;
            backdrop-filter: blur(16px) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 16px !important;
            margin: 20px !important;
        }

        /* --- بەشی ڕیکلامی ڤیدیۆیی --- */
        #ad-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10; display: none;
        }
        #skip-btn {
            position: absolute; bottom: 80px; right: 20px;
            background: rgba(0, 0, 0, 0.7); border: 1px solid #fff;
            color: #fff; padding: 10px 20px; cursor: pointer;
            font-size: 14px; border-radius: 4px; display: none; z-index: 11;
        }

        /* --- بەشی ڕیکلامی بانەر لەکاتی پۆز --- */
        #pause-banner {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5; display: none; max-width: 80%;
        }
        #pause-banner img { width: 100%; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
    </style>
</head>
<body>

<div id="player-container">
    <div id="ad-overlay">
        <video id="ad-video" style="width:100%; height:100%; object-fit: contain;">
            <source src="لێرە_لینکی_ڤیدیۆی_ڕیکلامەکە_دابنێ.mp4" type="video/mp4">
        </video>
        <div id="skip-btn">تێپەڕاندنی ڕیکلام (١٠)</div>
    </div>

    <div id="pause-banner">
        <a href="لێرە_لینکی_ماڵپەڕی_ڕیکلامەکە_دابنێ" target="_blank">
            <img src="https://i.postimg.cc/Gp4xSs3k/kurdflix-ads-2-980x120-px.gif" alt="Advertisement">
        </a>
    </div>

    <video id="player" playsinline controls poster="https://i.postimg.cc/N0TsNXr0/film-daspeek-thumbnale.png">
        <source src="" type="video/mp4" />
    </video>
</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('src');
        
        const mainVideo = document.getElementById('player');
        const adOverlay = document.getElementById('ad-overlay');
        const adVideo = document.getElementById('ad-video');
        const skipBtn = document.getElementById('skip-btn');
        const pauseBanner = document.getElementById('pause-banner');

        if (!videoUrl) {
            document.body.innerHTML = '<h2 style="color:white;text-align:center;">فیلمەکە نەدۆزرایەوە</h2>';
            return;
        }

        // ١. ڕێکخستنی پلەیەر
        const player = new Plyr('#player', {
            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'fullscreen'],
        });
        mainVideo.querySelector('source').src = videoUrl;
        mainVideo.load();

        // ٢. لۆجیکی ڕیکلامی ڤیدیۆیی
        let adPlayed = false;
        player.on('play', () => {
            if (!adPlayed) {
                player.pause();
                showAd();
            }
        });

        function showAd() {
            adPlayed = true;
            adOverlay.style.display = 'block';
            adVideo.play();

            let timeLeft = 10;
            const timer = setInterval(() => {
                timeLeft--;
                skipBtn.style.display = 'block';
                skipBtn.innerText = `تێپەڕاندن (${timeLeft})`;
                
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    skipBtn.innerText = 'تێپەڕاندنی ڕیکلام';
                    skipBtn.onclick = closeAd;
                }
            }, 1000);
        }

        function closeAd() {
            adVideo.pause();
            adOverlay.style.display = 'none';
            player.play();
        }

        // ٣. لۆجیکی بانەر لەکاتی پۆز (Pause)
        player.on('pause', () => {
            if (adPlayed) pauseBanner.style.display = 'block';
        });
        player.on('play', () => {
            pauseBanner.style.display = 'none';
        });
    });
</script>

</body>
</html>

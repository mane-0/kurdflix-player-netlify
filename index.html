<div id='video-container' style='position: relative; width: 100%; background: #000; border-radius: 15px; overflow: hidden; aspect-ratio: 16 / 9;'>
  
  <iframe allowfullscreen='true' expr:src='data:movie.player[0]' frameborder='0' id='movie_player' scrolling='no' style='width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1;'/>

  <div id='ads-overlay' style='position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; cursor: pointer; background: rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center;'>
    <div style='background: rgba(229, 9, 20, 0.9); color: white; padding: 15px 30px; border-radius: 50px; font-weight: bold; font-size: 18px;'>
       کلیک بکە بۆ بینین <i class='fa fa-play' style='margin-right: 10px;'/>
    </div>
  </div>

</div>

<script type='text/javascript'>
//<![CDATA[
  const container = document.getElementById('video-container');
  const overlay = document.getElementById('ads-overlay');

  overlay.addEventListener('click', function() {
    
    // 1. لێرەدا کۆدی Adsterra (Direct Link) یان هەر ڕیکلامێکی تر دادەنێیت
    // بۆ نموونە کردنەوەی لۆکاڵ نۆتیفیکەیشن یان پۆپ ئەندەر
    window.open('لینکە_تایبەتەکەی_ئەدستێرا_لێرە_دابنێ', '_blank');

    // 2. بردنە ناو فوول سکرین بۆ ئەوەی ڕیکلامەکە لە دەرەوە نەمێنێت
    if (container.requestFullscreen) {
      container.requestFullscreen();
    } else if (container.mozRequestFullScreen) {
      container.mozRequestFullScreen();
    } else if (container.webkitRequestFullscreen) {
      container.webkitRequestFullscreen();
    } else if (container.msRequestFullscreen) {
      container.msRequestFullscreen();
    }

    // 3. لابردنی داپۆشەرەکە بۆ ئەوەی فیلمەکە دەست پێ بکات
    overlay.style.display = 'none';
  });
//]]>
</script>
